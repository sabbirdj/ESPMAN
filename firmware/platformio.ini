; ============================================================================
;  PlatformIO configuration for ESP Device Manager client firmware
; ============================================================================
;  Install PlatformIO:  pip install platformio
;  Build & upload:      pio run -t upload
;  Serial monitor:      pio device monitor
; ============================================================================

[platformio]
default_envs = esp32dev

; Common settings shared by all ESP environments
[common]
lib_deps =
  links2004/arduinoWebSockets @ ^2.4.1
  bblanchon/ArduinoJson @ ^7.0.0
build_flags =
  -D SerialBaud=115200

; ----- ESP8266 (e.g. NodeMCU, Wemos D1 Mini) -----
[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}

; ----- ESP32 (e.g. ESP32 DevKitC, NodeMCU-32S) -----
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}

; ----- ESP32-S2 -----
[env:esp32-s2-saola-1]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}

; ----- ESP32-S3 -----
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}

; ----- ESP32-C3 -----
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}

; ----- ESP32-C6 -----
[env:esp32-c6-devkitc-1]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
